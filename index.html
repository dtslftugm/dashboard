<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Bidang Dashboard</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans pb-10">

    <div class="max-w-6xl mx-auto px-4 mt-8">
        
        <!-- Dropdown Pemilih Bidang Dashboard -->
        <div class="mb-8 max-w-xs mx-auto text-center">
            <label for="bidang-selector" class="block text-sm font-medium text-gray-700 mb-2">Pilih Bidang Dashboard:</label>
            <select id="bidang-selector" class="block w-full bg-white border border-gray-300 rounded-md py-2 px-3 shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm cursor-pointer">
                <option value="keuangan">Keuangan</option>
                <option value="akademik">Akademik</option>
                <option value="kerjasama">Kerjasama</option>
                <option value="sdm">SDM</option>
            </select>
        </div>

        <!-- Judul Group Dinamis dari Cell E2 -->
        <h1 id="group-title" class="text-2xl font-bold text-gray-800 mb-6 text-center uppercase tracking-wide">
            Memuat Data...
        </h1>

        <!-- Container Grid untuk Menampung Card Indikator/Kategori -->
        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Card data terpopulasi otomatis di sini -->
        </div>
    </div>

    <script>
        // ======================================
        // URL WEB APP GOOGLE APPS SCRIPT (GAS)
        // ======================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxtVtLgZwTK928q48nfTuZHesNM65Q3xHct7PeRMwHrcqwtfEpHwwbMK6nQiDgW0o2a/exec"; 

        /**
         * Fungsi helper untuk memformat angka secara dinamis.
         * Otomatis menggunakan format Rupiah (IDR) jika angka bernilai besar (> 100.000)
         * yang biasanya mengindikasikan nominal mata uang/anggaran keuangan.
         */
        function formatNumber(value) {
            if (typeof value === 'number') {
                if (value > 100000) {
                    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(value);
                }
                return new Intl.NumberFormat('id-ID').format(value);
            }
            return value;
        }

        /**
         * Fungsi helper untuk memformat persentase dari Google Sheets decimal (cth: 0.1916 menjadi 19.16%)
         */
        function formatPercent(value) {
            return typeof value === 'number' ? (value * 100).toFixed(2) + '%' : value;
        }

        /**
         * Fungsi utama untuk mengambil data dari backend GAS berdasarkan bidang terpilih
         */

// Fungsi global yang akan dipanggil secara otomatis oleh JSONP dari GAS
function handleDataDashboard(data) {
    const container = document.getElementById('card-container');
    const titleEl = document.getElementById('group-title');

    const oldScript = document.getElementById('jsonp-script');
    if (oldScript) oldScript.remove();

    if (data.error) {
        titleEl.innerText = "Error: " + data.error;
        return;
    }

    titleEl.innerText = data.groupTitle;

    // 1. Loop dan Render Kategori (Tampilan Grid 4 Kolom Khusus Persentase)
    data.items.forEach(item => {
        // Menghitung persentase realisasi tahun 2025 terhadap rencana tahun 2026
        // Atau jika di GAS Anda mengirimkan persentase langsung, silakan disesuaikan.
        const persen2025 = item.rencana > 0 ? formatPercent(item.realisasi2025 / item.rencana) : "0.00%";

        const card = `
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 p-6 md:col-span-2 hover:shadow-lg transition">
                <h2 class="text-lg font-bold text-blue-900 border-b border-gray-100 pb-3 mb-4">${item.kategori}</h2>
                
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
                    <!-- Kolom 1: Realisasi 2026 -->
                    <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <p class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">Realisasi 2026</p>
                        <p class="text-xl font-extrabold text-blue-950 mt-1">${formatPercent(item.realisasiPersen)}</p>
                    </div>

                    <!-- Kolom 2: Rencana/Target 2026 -->
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Rencana 2026</p>
                        <p class="text-xl font-extrabold text-gray-700 mt-1">100.00%</p>
                    </div>

                    <!-- Kolom 3: Realisasi 2025 -->
                    <div class="bg-emerald-50 p-3 rounded-lg border border-emerald-100">
                        <p class="text-[10px] text-emerald-600 font-bold uppercase tracking-wider">Realisasi 2025</p>
                        <p class="text-xl font-extrabold text-emerald-950 mt-1">${persen2025}</p>
                    </div>

                    <!-- Kolom 4: Pertumbuhan / Deviasi -->
                    <div class="bg-amber-50 p-3 rounded-lg border border-amber-100 flex flex-col justify-center">
                        <p class="text-[10px] text-amber-600 font-bold uppercase tracking-wider">Selisih Serapan</p>
                        <p class="text-lg font-bold text-amber-950 mt-1">
                            ${( (item.realisasiPersen - (item.realisasi2025 / item.rencana)) * 100 ).toFixed(2)}%
                        </p>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', card);
    });

    // 2. Render Card Total (Tampilan Grid 4 Kolom Khusus Persentase)
    if (data.total && data.total.kategori) {
        const totalPersen2025 = data.total.rencana > 0 ? formatPercent(data.total.realisasi2025 / data.total.rencana) : "0.00%";
        const selisihTotal = ( (data.total.realisasiPersen - (data.total.realisasi2025 / data.total.rencana)) * 100 ).toFixed(2);

        const totalCard = `
            <div class="bg-slate-800 text-white rounded-xl shadow-md overflow-hidden p-6 md:col-span-2">
                <h2 class="text-xl font-bold border-b border-slate-700 pb-3 mb-4">${data.total.kategori}</h2>
                
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
                    <!-- Kolom 1: Total Realisasi 2026 -->
                    <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                        <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-wider">Total Realisasi 2026</p>
                        <p class="text-xl font-extrabold text-emerald-300 mt-1">${formatPercent(data.total.realisasiPersen)}</p>
                    </div>

                    <!-- Kolom 2: Total Rencana 2026 -->
                    <div class="bg-slate-900/30 p-3 rounded-lg border border-slate-700/50">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Total Rencana 2026</p>
                        <p class="text-xl font-extrabold text-slate-300 mt-1">100.00%</p>
                    </div>

                    <!-- Kolom 3: Total Realisasi 2025 -->
                    <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                        <p class="text-[10px] text-sky-400 font-bold uppercase tracking-wider">Total Realisasi 2025</p>
                        <p class="text-xl font-extrabold text-sky-300 mt-1">${totalPersen2025}</p>
                    </div>

                    <!-- Kolom 4: Selisih Total -->
                    <div class="bg-slate-900/30 p-3 rounded-lg border border-slate-700/50 flex flex-col justify-center">
                        <p class="text-[10px] text-amber-400 font-bold uppercase tracking-wider">Selisih Serapan</p>
                        <p class="text-lg font-bold text-white mt-1">
                            ${selisihTotal}%
                        </p>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', totalCard);
    }   
}

// Fungsi utama untuk meminta data dengan metode JSONP
function fetchDashboardData(namaBidang) {
    const container = document.getElementById('card-container');
    const titleEl = document.getElementById('group-title');
    
    titleEl.innerText = "Memuat Data...";
    container.innerHTML = ""; 

    // Membuat elemen <script> untuk memicu request JSONP bypass CORS
    const script = document.createElement('script');
    script.id = 'jsonp-script';
    
    // Menyertakan parameter callback menuju fungsi 'handleDataDashboard'
    script.src = `${GAS_API_URL}?bidang=${namaBidang}&callback=handleDataDashboard`;
    
    // Jika terjadi kegagalan load script
    script.onerror = function() {
        titleEl.innerText = "Gagal Menghubungkan ke API Google Apps Script (JSONP Error)";
    };

    // Memasukkan script ke dokumen untuk mengeksekusi request
    document.body.appendChild(script);
}

        
        // Jalankan fetch ulang setiap kali pilihan dropdown diubah
        document.getElementById('bidang-selector').addEventListener('change', (e) => {
            fetchDashboardData(e.target.value);
        });

        // Tampilkan data pertama kali secara otomatis (sesuai opsi default pertama: keuangan)
        fetchDashboardData(document.getElementById('bidang-selector').value);
    </script>
</body>
</html>
