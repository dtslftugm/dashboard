<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Bidang Dashboard</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans pb-10">

    <div class="max-w-6xl mx-auto px-4 mt-8">
        
        <!-- Dropdown Pemilih Bidang Dashboard -->
        <div class="mb-8 max-w-xs mx-auto text-center">
            <label for="bidang-selector" class="block text-sm font-medium text-gray-700 mb-2">Pilih Bidang Dashboard:</label>
            <select id="bidang-selector" class="block w-full bg-white border border-gray-300 rounded-md py-2 px-3 shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm cursor-pointer">
                <option value="keuangan">Keuangan</option>
                <option value="akademik">Akademik</option>
                <option value="kerjasama">Kerjasama</option>
                <option value="sdm">SDM</option>
            </select>
        </div>

        <!-- Judul Group Dinamis dari Cell E2 -->
        <h1 id="group-title" class="text-2xl font-bold text-gray-800 mb-6 text-center uppercase tracking-wide">
            Memuat Data...
        </h1>

        <!-- Container Grid untuk Menampung Card Indikator/Kategori -->
        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Card data terpopulasi otomatis di sini -->
        </div>
    </div>

    <script>
        // ======================================
        // URL WEB APP GOOGLE APPS SCRIPT (GAS)
        // ======================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxtVtLgZwTK928q48nfTuZHesNM65Q3xHct7PeRMwHrcqwtfEpHwwbMK6nQiDgW0o2a/exec"; 

        /**
         * Fungsi helper untuk memformat angka secara dinamis.
         * Otomatis menggunakan format Rupiah (IDR) jika angka bernilai besar (> 100.000)
         * yang biasanya mengindikasikan nominal mata uang/anggaran keuangan.
         */
        function formatNumber(value) {
            if (typeof value === 'number') {
                if (value > 100000) {
                    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(value);
                }
                return new Intl.NumberFormat('id-ID').format(value);
            }
            return value;
        }

        /**
         * Fungsi helper untuk memformat persentase dari Google Sheets decimal (cth: 0.1916 menjadi 19.16%)
         */
        function formatPercent(value) {
            return typeof value === 'number' ? (value * 100).toFixed(2) + '%' : value;
        }

        /**
         * Fungsi utama untuk mengambil data dari backend GAS berdasarkan bidang terpilih
         */

// Fungsi global yang akan dipanggil secara otomatis oleh JSONP dari GAS
function handleDataDashboard(data) {
    const container = document.getElementById('card-container');
    const titleEl = document.getElementById('group-title');

    const oldScript = document.getElementById('jsonp-script');
    if (oldScript) oldScript.remove();

    if (data.error) {
        titleEl.innerText = "Error: " + data.error;
        return;
    }

    titleEl.innerText = data.groupTitle;

    // 1. Loop dan Render Data Item Utama dengan komparasi 2025
    data.items.forEach(item => {
        const card = `
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 p-6 hover:shadow-lg transition">
                <h2 class="text-lg font-bold text-blue-900 border-b border-gray-100 pb-2 mb-4">${item.kategori}</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-3 rounded-lg">
                        <p class="text-xs text-blue-600 font-semibold uppercase tracking-wider">${data.subTitleRealisasi} (2026)</p>
                        <p class="text-base font-bold text-blue-900 mt-1">${formatNumber(item.realisasi)}</p>
                        <span class="inline-block mt-2 text-xs font-medium bg-blue-200 text-blue-800 px-2 py-0.5 rounded">
                            ${formatPercent(item.realisasiPersen)}
                        </span>
                        <div class="mt-3 pt-2 border-t border-blue-100 text-xs text-blue-700">
                            Realisasi 2025: <span class="font-semibold">${formatNumber(item.realisasi2025)}</span>
                        </div>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-lg flex flex-col justify-between">
                        <div>
                            <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider">${data.subTitleRencana}</p>
                            <p class="text-base font-bold text-gray-800 mt-1">${formatNumber(item.rencana)}</p>
                        </div>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', card);
    });

    // 2. Render Card Total dengan komparasi 2025
    if (data.total && data.total.kategori) {
        const totalCard = `
            <div class="bg-indigo-900 text-white rounded-xl shadow-md overflow-hidden p-6 md:col-span-2">
                <h2 class="text-xl font-bold border-b border-slate-700 pb-2 mb-4">${data.total.kategori}</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-xs text-slate-400 font-semibold uppercase">${data.subTitleRealisasi} (2026)</p>
                        <p class="text-2xl font-bold text-emerald-400 mt-1">${formatNumber(data.total.realisasi)}</p>
                        <span class="inline-block mt-1 text-xs text-emerald-300 bg-emerald-950/50 px-2 py-0.5 rounded">
                            ${formatPercent(data.total.realisasiPersen)}
                        </span>
                        <div class="mt-4 pt-2 border-t border-slate-700 text-sm text-slate-300">
                            Total Realisasi 2025: <span class="font-bold text-white">${formatNumber(data.total.realisasi2025)}</span>
                        </div>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 font-semibold uppercase">${data.subTitleRencana}</p>
                        <p class="text-2xl font-bold text-gray-200 mt-1">${formatNumber(data.total.rencana)}</p>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', totalCard);
    }   
}

// Fungsi utama untuk meminta data dengan metode JSONP
function fetchDashboardData(namaBidang) {
    const container = document.getElementById('card-container');
    const titleEl = document.getElementById('group-title');
    
    titleEl.innerText = "Memuat Data...";
    container.innerHTML = ""; 

    // Membuat elemen <script> untuk memicu request JSONP bypass CORS
    const script = document.createElement('script');
    script.id = 'jsonp-script';
    
    // Menyertakan parameter callback menuju fungsi 'handleDataDashboard'
    script.src = `${GAS_API_URL}?bidang=${namaBidang}&callback=handleDataDashboard`;
    
    // Jika terjadi kegagalan load script
    script.onerror = function() {
        titleEl.innerText = "Gagal Menghubungkan ke API Google Apps Script (JSONP Error)";
    };

    // Memasukkan script ke dokumen untuk mengeksekusi request
    document.body.appendChild(script);
}

        
        // Jalankan fetch ulang setiap kali pilihan dropdown diubah
        document.getElementById('bidang-selector').addEventListener('change', (e) => {
            fetchDashboardData(e.target.value);
        });

        // Tampilkan data pertama kali secara otomatis (sesuai opsi default pertama: keuangan)
        fetchDashboardData(document.getElementById('bidang-selector').value);
    </script>
</body>
</html>
